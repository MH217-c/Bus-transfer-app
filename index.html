<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>환승 버스 추천</title>
<style>
body { font-family: -apple-system, BlinkMacSystemFont; background: #f5f7fb; margin: 0; padding: 10px; }
h1 { text-align: center; font-size: 22px; }
.best-box {
  background: #007aff; color: white;
  margin: 12px 0; padding: 18px 20px;
  border-radius: 18px; text-align: center;
  font-size: 18px; line-height: 1.6; min-height: 60px;
  display: flex; align-items: center; justify-content: center;
}
.refresh-btn {
  display: block; margin: 0 auto 14px;
  padding: 12px 24px; border-radius: 12px;
  border: none; background: #007aff; color: white;
  font-size: 16px; cursor: pointer; min-width: 160px;
}
.refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.container { display: grid; gap: 14px; }
.card {
  background: white; padding: 18px 20px;
  border-radius: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.08);
  border: 3px solid transparent;
}
.card.best { border-color: #007aff; }
.stop-name { font-size: 17px; font-weight: bold; margin-bottom: 2px; }
.stop-code { font-size: 12px; color: #999; margin-bottom: 12px; }
.bus-row {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 7px 0; border-top: 1px solid #f0f0f0;
}
.bus-name { font-size: 17px; font-weight: bold; min-width: 58px; }
.bus-right { text-align: right; }
.bus-min { font-size: 26px; font-weight: bold; color: #007aff; line-height: 1; }
.bus-min.urgent { color: #ff3b30; }
.bus-min.soon   { color: #ff9500; }
.bus-next { font-size: 12px; color: #aaa; margin-top: 2px; }
.no-bus { font-size: 14px; color: #bbb; padding: 6px 0; }
.debug-toggle {
  display: block; margin: 20px auto 6px;
  padding: 7px 14px; border-radius: 8px;
  border: 1px solid #ddd; background: white;
  font-size: 12px; cursor: pointer; color: #888;
}
.debug-box {
  display: none; margin-top: 6px;
  background: #1e1e2e; border-radius: 12px;
  padding: 14px; color: #cdd6f4;
  font-family: monospace; font-size: 11px;
  white-space: pre-wrap; word-break: break-all;
  max-height: 400px; overflow-y: auto;
}
</style>
</head>
<body>

<h1>🚍 환승 최적 추천</h1>
<div id="bestBox" class="best-box">버튼 눌러서 조회</div>
<button class="refresh-btn" id="refreshBtn" onclick="render()">🔄 새로고침</button>
<div class="container" id="container"></div>
<button class="debug-toggle" onclick="toggleDebug()">🔍 원본 데이터 보기</button>
<div class="debug-box" id="debugBox"></div>

<script>
// 각 정류장에서 실제로 서는 버스만 routes에 명시
const STOPS = [
  {
    name: "수원순복음교회·하늘채더퍼스트",
    code: "02269",
    stationId: "202000212",
    routes: ["701A", "64"],
  },
  {
    name: "영통아이파크캐슬2단지",
    code: "04078",
    stationId: "202000224",
    routes: ["701A", "13A", "64"],
  },
  {
    name: "영통롯데캐슬엘클래스1단지",
    code: "04440",
    stationId: "202000223",
    routes: ["13A", "13-1", "64"],
  },
];

// 정규화: 공백·앞자리0·"번" 제거 후 대문자
function norm(raw) {
  if (!raw) return "";
  return String(raw).trim()
    .replace(/\s+/g, "")
    .replace(/번$/, "")
    .replace(/^0+(?=\d)/, "")
    .toUpperCase();
}

// API에서 내려오는 이름 → 표준 이름 매핑
const ALIAS = {
  "13-1": "13-1", "131": "13-1", "13.1": "13-1",
  "13A": "13A",   "13 A": "13A",
  "701A": "701A", "701 A": "701A",
  "64": "64",
};

function resolve(raw) {
  const n = norm(raw);
  return ALIAS[n] ?? n;
}

// 목적지(망포고)까지 탑승 소요 시간 (분)
function rideMin(route) {
  const map = { "13-1": 10, "13A": 11, "701A": 13, "64": 14 };
  return map[route] ?? 13;
}

function minCls(m) {
  if (m <= 2) return "urgent";
  if (m <= 6) return "soon";
  return "";
}

let debugLog = "";

async function getArrival(stop) {
  const res = await fetch(`/api/bus?stationId=${stop.stationId}`);
  const data = await res.json();

  debugLog += "\n=== " + stop.name + " [" + stop.stationId + "] ===\n";

  if (data._error) {
    debugLog += "  오류: " + data._error + "\n";
    return [];
  }

  let items = data?.response?.msgBody?.busArrivalList;
  if (!items) {
    debugLog += "  응답: " + JSON.stringify(data).slice(0, 300) + "\n";
    return [];
  }
  if (!Array.isArray(items)) items = [items];

  // 이 정류장에서 실제로 서는 노선 집합
  const stopRouteSet = new Set(stop.routes.map(norm));

  const list = [];
  for (const item of items) {
    const rawName = item.routeNm ?? item.routeName ?? "";
    const resolved = resolve(rawName);
    const hit = stopRouteSet.has(norm(resolved));
    debugLog += "  " + (hit ? "V " : "  ") + '"' + rawName + '" -> "' + resolved + '"\n';
    if (!hit) continue;
    const t1 = parseInt(item.predictTime1);
    const t2 = parseInt(item.predictTime2);
    if (isNaN(t1)) continue;
    list.push({
      route: resolved, rawName,
      time: t1, time2: isNaN(t2) ? null : t2,
      flag: item.flag ?? "",
    });
  }
  list.sort((a, b) => a.time - b.time);
  return list.slice(0, 3);
}

async function render() {
  const container = document.getElementById("container");
  const bestBox   = document.getElementById("bestBox");
  const btn       = document.getElementById("refreshBtn");
  container.innerHTML = "";
  bestBox.textContent = "불러오는 중...";
  btn.disabled = true; btn.textContent = "조회 중...";
  debugLog = "";

  const allArrivals = await Promise.all(
    STOPS.map(s => getArrival(s).catch(e => {
      debugLog += "\n[오류] " + s.name + ": " + e.message + "\n";
      return [];
    }))
  );

  // 정류장 인덱스 × 2분 = 도보 이동 시간 가정
  let bestStop = null, bestBus = null, minTotal = Infinity;
  const results = STOPS.map((stop, i) => {
    const arrivals = allArrivals[i];
    for (const bus of arrivals) {
      if (bus.flag === "STOP") continue;
      const walkMin = i * 2;
      const total = walkMin + bus.time + rideMin(bus.route);
      if (total < minTotal) {
        minTotal = total;
        bestStop = stop.name;
        bestBus  = bus.route;
      }
    }
    return { stop, arrivals };
  });

  bestBox.innerHTML = bestStop
    ? "👉 <strong>" + bestStop + "</strong><br>"
      + "<span style='font-size:15px'>" + bestBus + "번 탑승 → 망포고까지 약 <strong>" + minTotal + "분</strong> 예상</span>"
    : "해당 노선 정보 없음";

  for (const { stop, arrivals } of results) {
    const card = document.createElement("div");
    card.className = "card" + (stop.name === bestStop ? " best" : "");

    let html = "<div class='stop-name'>" + stop.name + "</div>"
             + "<div class='stop-code'>정류소 " + stop.code + " · ID " + stop.stationId + "</div>";

    if (arrivals.length === 0) {
      html += "<div class='no-bus'>해당 노선 없음 (운행 전·후 또는 매칭 실패)</div>";
    } else {
      for (const bus of arrivals) {
        const cls  = minCls(bus.time);
        const next = bus.time2 != null
          ? "<div class='bus-next'>다음 " + bus.time2 + "분 후</div>" : "";
        const flag = bus.flag === "STOP" ? " ⛔" : bus.flag === "WAIT" ? " ⏳" : "";
        const hint = norm(bus.rawName) !== norm(bus.route)
          ? "<span style='font-size:11px;color:#bbb'> [API:" + bus.rawName + "]</span>" : "";
        html += "<div class='bus-row'>"
          + "<div class='bus-name'>" + bus.route + "번" + hint + flag + "</div>"
          + "<div class='bus-right'>"
          + "<div class='bus-min " + cls + "'>" + bus.time
          + "<span style='font-size:14px;font-weight:400'>분</span></div>"
          + next
          + "</div></div>";
      }
    }
    card.innerHTML = html;
    container.appendChild(card);
  }

  document.getElementById("debugBox").textContent = debugLog;
  btn.disabled = false; btn.textContent = "🔄 새로고침";
}

function toggleDebug() {
  const b = document.getElementById("debugBox");
  b.style.display = b.style.display === "block" ? "none" : "block";
}
</script>
</body>
</html>
